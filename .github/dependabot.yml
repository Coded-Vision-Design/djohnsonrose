version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 25
    groups:
      transitive-security:
        applies-to: security-updates
        patterns: ["*"]
      patch-and-minor:
        applies-to: version-updates
        update-types: ["patch", "minor"]
