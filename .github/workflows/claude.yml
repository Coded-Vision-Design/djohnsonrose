# Per-repo caller for the org-level reusable Claude Code Action.
# Deployed to every active CVD repo by scripts/install-triage-claude.ps1
# in cdv-vps-ops.
#
# Trigger by commenting "@claude please fix this" on any issue or PR
# review comment, or by adding "@claude" to a new issue body.
name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    uses: Coded-Vision-Design/.github/.github/workflows/reusable-claude-code.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
